<div class="dashboard-container">

  <!-- ☰ MOBILE TOGGLE BUTTON -->
  <div class="mobile-header">
    <fa-icon
      [icon]="['fas','bars']"
      (click)="toggleSidebar()">
    </fa-icon>
    <span>Management Portal</span>
  </div>

  <!-- OVERLAY (for mobile) -->
  <div class="overlay"
       *ngIf="isSidebarOpen"
       (click)="closeSidebar()">
  </div>

  <!-- SIDEBAR -->
  <div class="dashboard-container-left-menu left-menu"
       [class.open]="isSidebarOpen">

    <div class="left-menu-title">
      <h1>Management Portal</h1>
    </div>

    <div class="items">
      <div class="item"
           [routerLink]="['members']"
           [ngClass]="{ 'active': activeMenu === 'members' }"
           (click)="setActiveMenu('members'); closeSidebar()">

        <fa-icon [icon]="['fas','dumbbell']"></fa-icon>
        <span>Members</span>
      </div>

      <div class="item"
           [routerLink]="['dashboard']"
           [ngClass]="{ 'active': activeMenu === 'dashboard' }"
           (click)="setActiveMenu('dashboard'); closeSidebar()">

        <fa-icon [icon]="['fas','cog']"></fa-icon>
        <span>Dashboard</span>
      </div>
    </div>

    <div class="logout-button" (click)="logout()">
      <fa-icon [icon]="['fas','sign-out-alt']"></fa-icon>
      <span>Logout</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="dashboard-container-right">
    <router-outlet></router-outlet>
  </div>

</div>
