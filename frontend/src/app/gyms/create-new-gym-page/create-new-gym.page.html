
<div class="add-new-gym-page-container">
  <div class="gym-form-container">
    <form [formGroup]="gymForCreationFormGroup" class="gym-form">

      <div class="form-row full-width">
        <div class="form-group">
          <label>GYM NAME <span>*</span></label>
          <input
            type="text"
            formControlName="gymName"
            placeholder="e.g. Iron Peak Fitness"
          />
        </div>
      </div>

      <div class="form-row two-columns">
        <div class="form-group">
          <label>OWNER NAME</label>
          <input
            type="text"
            formControlName="ownerName"
            placeholder="Full Legal Name"
          />
        </div>

        <div class="form-group">
          <label>SUBSCRIPTION PLAN</label>
          <select formControlName="subscriptionPlan">
            <option value="basic">Basic</option>
            <option value="premium">Premium</option>
            <option value="enterprise">Enterprise</option>
          </select>
        </div>
      </div>

      <div class="form-row two-columns">
        <div class="form-group">
          <label>PHONE NUMBER <span>*</span></label>
          <input
            type="text"
            formControlName="phone"
            placeholder="+1 (555) 000-0000"
          />
        </div>

        <div class="form-group">
          <label>EMAIL ADDRESS <span>*</span></label>
          <input
            type="email"
            formControlName="email"
            placeholder="contact@gymname.com"
          />
        </div>
      </div>

      <div class="form-row full-width">
        <div class="form-group">
          <label>PHYSICAL ADDRESS <span>*</span></label>
          <textarea
            rows="4"
            formControlName="address"
            placeholder="Street name, City, State, ZIP code"
          ></textarea>
        </div>
      </div>

      <div class="status-container">
        <div class="status-left">
          <div class="status-icon">⏻</div>
          <div class="status-text">
            <h4>Active Status</h4>
            <p>The gym will be visible in public directories immediately.</p>
          </div>
        </div>

        <label class="switch">
          <input type="checkbox" formControlName="isActive"/>
          <span class="slider"></span>
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="cancel-btn">Cancel</button>
        <button
          type="submit"
          (click)="createGym()"
          class="submit-btn"
          [disabled]="gymForCreationFormGroup.invalid">
          Register Gym
        </button>
      </div>
    </form>
  </div>
</div>
