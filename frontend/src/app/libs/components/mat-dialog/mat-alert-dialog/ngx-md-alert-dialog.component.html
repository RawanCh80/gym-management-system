<div class="header">
  <div class="toolbar">
    <div class="header-content">
      <div class="header-title">
        {{ data.title }}
      </div>
    </div>
    <div (click)="dialogRef.close()"
         class="close-component">
      <fa-icon [icon]="['far', 'times-circle']"></fa-icon>
    </div>
  </div>
</div>
<mat-dialog-content>
    <span [style.font-size]="data.iconObj.fontSize"
          class="alert-icon">
        <fa-icon [icon]="data.iconObj.icon"
                 [style.color]="data.iconObj.color">
		</fa-icon>
    </span>
  <div class="message-container">
    @if (data.subTitle) {
      <ng-container>
        <div class="subtitle-message"
             mat-line>
          {{ data.subTitle }}
        </div>
      </ng-container>
    }
    <div class="alert-message"
         mat-line>
      {{ data.message }}
    </div>
  </div>
</mat-dialog-content>
