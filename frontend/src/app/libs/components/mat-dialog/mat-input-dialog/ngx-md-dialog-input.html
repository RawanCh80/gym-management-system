<div tourAnchor="ngx-md-dialog-input-dialog">
	<div class="input-page-header">
		<div class="title">
			{{ data.title }}
		</div>
		<mat-toolbar-row>
			<div class="icon">
				<fa-icon [icon]="data.faIcon"></fa-icon>
			</div>
		</mat-toolbar-row>
	</div>
	<form [formGroup]="formDialog">
		<mat-dialog-content>
			<div *ngIf="data.message"
				 class="message">
				{{ data.message }}
			</div>
			<div *ngIf="data.messageHtml"
				 [innerHTML]="data.messageHtml"
				 class="message">
			</div>
			<ng-container *ngFor="let control of data.inputList">
				<div *ngIf="control.inputType === InputTypeEnum.textarea"
					 class="form-field">
					<mat-hint>
						{{ control.matHint }}
						<ng-template [ngIf]="control.valueRegex">
							( {{ 'app.enums.general.count' | translate }}: {{formDialog.get(control.name).value?.length
							||
							0}
							)
						</ng-template>
					</mat-hint>
					<textarea [formControlName]="control.name"
							  [placeholder]="control.placeholder">
					</textarea>
				</div>
				<div *ngIf="control.inputType === InputTypeEnum.password"
					 class="form-field">
					<input (keyup.enter)="save()"
						   [formControlName]="control.name"
						   [placeholder]="control.placeholder"
						   [type]="control.inputType">
					<mat-error *ngIf="formDialog.get(control.name).errors
                            && formDialog.get(control.name).dirty">
						{{ control.errorMessage }}
					</mat-error>
				</div>
				<div *ngIf="control.inputType === InputTypeEnum.text"
					 class="form-field">
					<input (keyup.enter)="save()"
						   [formControlName]="control.name"
						   [placeholder]="control.placeholder"
						   [type]="control.inputType"
						   tourAnchor="ngx-md-dialog-input">
					<mat-error *ngIf="formDialog.get(control.name).errors
                            && formDialog.get(control.name).dirty">
						{{ control.errorMessage }}
					</mat-error>
				</div>
			</ng-container>
		</mat-dialog-content>
	</form>
	<mat-dialog-actions class="ngx-md-dialog-actions-group">
		<button (click)="cancel()"
				class="cancel"
				mat-raised-button
				role="dismiss"
				type="button">
			{{ data.textCancelButton }}
		</button>
		<button (click)="save()"
				[disabled]="formDialog.invalid"
				class="save"
				color="primary"
				mat-raised-button
				role="save"
				type="button">
			{{ data.textOkButton }}
		</button>
	</mat-dialog-actions>
</div>
