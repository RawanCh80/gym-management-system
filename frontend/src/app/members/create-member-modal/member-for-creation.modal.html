<div class="member-template-creation-container">
  <div class="title-bar-container">
    <div class="title">
      Create Member
    </div>

    <div class="buttons-container">
      <button
        type="button"
        (click)="dismissModal()"
        class="dismiss-button">
        Cancel
      </button>

      <button
        type="button"
        (click)="createMember()"
        class="create-button">
        Create
      </button>
    </div>
  </div>

  <div class="content-container">
    <form [formGroup]="productTemplateForCreationFormGroup">

      <!-- Full Name -->
      <div class="form-group">
        <label>
          Full Name
        </label>
        <input
          type="text"
          placeholder="Full name ex: Rawan Cheaito"
          formControlName="fullName">
      </div>

      <!-- Phone Number -->
      <div class="form-group">
        <label>
          Phone Number
        </label>
        <input
          type="text"
          placeholder="Phone number ex: 01010101010"
          formControlName="phone">
      </div>

      <!-- Membership Name -->
      <div class="form-group">
        <label>
          Membership Name
        </label>
        <input
          type="text"
          placeholder="Membership ex: Gold"
          formControlName="membershipName">
      </div>

      <!-- Duration Days -->
      <div class="form-group">
        <label>
          Duration (Days)
        </label>
        <input
          type="number"
          placeholder="ex: 30"
          formControlName="durationDays">
      </div>

      <!-- Number of Sessions -->
      <div class="form-group">
        <label>
          Number of Sessions
        </label>
        <input
          type="number"
          placeholder="ex: 12"
          formControlName="numberOfSessions">
      </div>

      <!-- Price -->
      <div class="form-group">
        <label>
          Price
        </label>
        <input
          type="number"
          placeholder="ex: 50"
          formControlName="price">
      </div>

      <!-- Membership Start Date -->
      <div class="form-group">
        <label>
          Membership Start Date
        </label>
        <input
          type="date"
          formControlName="membershipStart">
      </div>

      <!-- Notes -->
      <div class="form-group">
        <label>
          Notes
        </label>
        <textarea
          rows="4"
          placeholder="Write notes here..."
          formControlName="notes">
        </textarea>
      </div>

      <!-- Active Toggle -->
      <div class="form-group toggle-group">
        <label>
          Active Membership
        </label>
        <input
          type="checkbox"
          formControlName="isActive">
      </div>

    </form>
  </div>
</div>
