<div class="member-template-creation-container">
  <div class="title-bar-container">
    <div class="title">
      Create Member
    </div>

    <div class="buttons-container">
      <button
        type="button"
        (click)="dismissModal()"
        class="dismiss-button">
        Cancel
      </button>

      <button
        type="button"
        (click)="createMember()"
        class="create-button"
        [disabled]="productTemplateForCreationFormGroup.invalid">
        Create
      </button>
    </div>
  </div>

  <div class="content-container">
    <form [formGroup]="productTemplateForCreationFormGroup" autocomplete="on">

      <!-- Full Name -->
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input
          id="fullName"
          name="fullName"
          type="text"
          autocomplete="name"
          placeholder="Full name ex: Rawan Cheaito"
          formControlName="fullName">
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input
          id="phone"
          name="phone"
          type="text"
          autocomplete="tel"
          placeholder="Phone number ex: 01010101010"
          formControlName="phone">
      </div>

      <!-- Packages FormArray -->
      <div formArrayName="packages">
        <div class="package-section" [formGroupName]="0">

          <h3>Package 1</h3>

          <!-- Duration -->
          <div class="form-group">
            <label for="durationDays">Duration (Days)</label>
            <input
              id="durationDays"
              name="durationDays"
              type="number"
              autocomplete="off"
              placeholder="ex: 30"
              formControlName="durationDays">
          </div>

          <!-- Sessions -->
          <div class="form-group">
            <label for="numberOfSessions">Number Of Sessions</label>
            <input
              id="numberOfSessions"
              name="numberOfSessions"
              type="number"
              autocomplete="off"
              placeholder="ex: 12"
              formControlName="numberOfSessions">
          </div>

          <!-- Price -->
          <div class="form-group">
            <label for="price">Price</label>
            <input
              id="price"
              name="price"
              type="number"
              autocomplete="off"
              placeholder="ex: 50"
              formControlName="price">
          </div>

          <!-- Start Date -->
          <div class="form-group">
            <label for="startDate">Start Date</label>
            <input
              id="startDate"
              name="startDate"
              type="date"
              autocomplete="off"
              formControlName="startDate">
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea
              id="notes"
              name="notes"
              rows="4"
              autocomplete="off"
              placeholder="Write notes here..."
              formControlName="notes">
            </textarea>
          </div>

        </div>
      </div>

    </form>
  </div>
</div>
