<div class="modal-container">
  <div class="header">
    <div class="header__title">Update AdminRoutes</div>
    <div (click)="closeModal()"
         class="header__close-icon">
      <fa-icon [icon]="['far', 'times-circle']"></fa-icon>
    </div>
  </div>

  <form class="form"
        [formGroup]="adminForm"
        (ngSubmit)="submitForm()">
    <div class="form-group">
      <label>Username</label>
      <input type="text" formControlName="username" placeholder="Enter username"/>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="text" formControlName="email" placeholder="Enter email"/>
    </div>

    <mat-dialog-actions>
      <button type="button"
              (click)="closeModal()"
              class="cancel-btn">
        Cancel
      </button>
      <button type="submit"
              [class.disabled]="adminForm.invalid"
              class="action-btn">
        Update
      </button>
    </mat-dialog-actions>
  </form>
</div>
